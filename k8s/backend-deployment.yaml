apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend-container
        image: ace-backend-service:v1
        imagePullPolicy: Never

        env:
        - name: LICENSE
          value: "accept"

        - name: ACE_SERVER_NAME
          value: "BACKENDSERVER"

        ports:
        - containerPort: 7800
